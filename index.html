<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CTF Movement Prototype</title>
  </head>
  <body>
    <div id="game"></div>
    <div id="hud">
      <div class="score">
        <b class="score-team score-red"><span class="score-label">RED</span><span id="red-score">0</span></b>
        <b class="score-team score-blue"><span id="blue-score">0</span><span class="score-label">BLUE</span></b>
      </div>
      <div id="status-toast" role="status" aria-live="polite"></div>
      <div class="hud-actions">
        <button id="settings-button" type="button" aria-label="Open settings" title="Settings">&#9881;</button>
      </div>
      <div id="settings-panel" class="settings-panel is-hidden">
        <div class="settings-title">Maps</div>
        <button type="button" data-map="training-crossing">Training Crossing</button>
        <button type="button" data-map="midline-rush">Grand Archive</button>
        <button type="button" data-map="flank-switch">Flank Switch</button>
        <div class="settings-title">Teams</div>
        <label>Red <select id="red-count" aria-label="Red team size">
          <option value="1">1 player</option>
          <option value="2">2 players</option>
          <option value="3">3 players</option>
          <option value="4">4 players</option>
        </select></label>
        <label>Blue <select id="blue-count" aria-label="Blue team size">
          <option value="1">1 player</option>
          <option value="2" selected>2 players</option>
          <option value="3">3 players</option>
          <option value="4">4 players</option>
        </select></label>
        <div class="settings-title">Display</div>
        <div class="settings-actions">
          <button id="fullscreen-button" type="button">Fullscreen</button>
          <button id="debug-button" type="button">Debug data</button>
        </div>
      </div>
      <pre id="debug"></pre>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
